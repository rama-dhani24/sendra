name: sendra
description: "Cross-border money transfer app — Europe/USA to Tanzania."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # File / share
  path_provider: ^2.0.0
  share_plus: ^9.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/sendra_icon.png"

  # Android adaptive icon
  adaptive_icon_background: "#0A4DFF"
  adaptive_icon_foreground: "assets/icons/sendra_icon.png"

  # Optional web/windows/macos support
  web:
    generate: true
    image_path: "assets/icons/sendra_icon.png"

  windows:
    generate: true
    image_path: "assets/icons/sendra_icon.png"

  macos:
    generate: true
    image_path: "assets/icons/sendra_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/sendra_icon.png