name: sendra
description: "Cross-border money transfer app — Europe/USA to Tanzania."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # File / share
  path_provider: ^2.0.0
  share_plus: ^9.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true